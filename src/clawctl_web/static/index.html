<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Management Interface</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OpenClaw Management Interface</h1>
            <div class="header-actions">
                <button id="refresh-models-btn" class="btn btn-secondary">Refresh Models</button>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <main>
            <nav class="main-nav">
                <button class="nav-btn active" data-page="dashboard">Dashboard</button>
                <button class="nav-btn" data-page="system">System Config</button>
            </nav>

            <div id="dashboard-page" class="page active">
                <section id="instances-section">
                    <h2>Instances</h2>
                    <div id="instances-container"></div>
                </section>

                <section id="users-section">
                    <h2>Users</h2>
                    <div id="users-container"></div>
                </section>
            </div>

            <div id="system-page" class="page">
                <section id="system-section">
                    <h2>System Configuration</h2>
                    <div id="system-container"></div>
                </section>

                <section id="maintenance-section">
                    <h2>Nightly Maintenance</h2>
                    <div id="maintenance-container">
                        <div class="card">
                            <div class="card-row">
                                <span class="card-label">Schedule</span>
                                <span id="maintenance-status-badge" class="badge badge-unknown">Loading...</span>
                            </div>
                            <div class="card-row">
                                <span class="card-label">Scheduled time</span>
                                <span id="maintenance-scheduled-time" class="card-value">—</span>
                            </div>
                            <div class="card-row">
                                <span class="card-label">Last run</span>
                                <span id="maintenance-last-run" class="card-value">—</span>
                            </div>
                            <div class="card-row">
                                <span class="card-label">Next run</span>
                                <span id="maintenance-next-run" class="card-value">—</span>
                            </div>
                            <div class="card-actions">
                                <button id="maintenance-run-btn" class="btn btn-primary" onclick="runMaintenanceNow()">Run Now</button>
                                <button id="maintenance-start-btn" class="btn btn-secondary" onclick="startMaintenanceSchedule()">Start Schedule</button>
                                <button id="maintenance-stop-btn" class="btn btn-secondary" onclick="stopMaintenanceSchedule()">Stop Schedule</button>
                            </div>
                            <div id="maintenance-message" class="maintenance-message" style="display:none;"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Model Selection Modal -->
        <div id="model-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Select Model</h2>
                <div class="form-group">
                    <label for="provider-select">Provider:</label>
                    <select id="provider-select" class="form-input">
                        <option value="openrouter">OpenRouter</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model-select">Model:</label>
                    <select id="model-select" class="form-input">
                        <option value="">Loading...</option>
                    </select>
                    <div id="model-pricing" class="model-pricing"></div>
                </div>
                <div class="form-group">
                    <button id="save-model-btn" class="btn btn-primary">Save</button>
                    <button id="cancel-model-btn" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Discord Pairing Modal -->
        <div id="discord-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeDiscordModal()">&times;</span>
                <h2>Discord Pairing: <span id="discord-username"></span></h2>
                <div id="discord-pairing-container">
                    <p>Loading...</p>
                </div>
                <div class="form-group">
                    <button class="btn btn-secondary" onclick="closeDiscordModal()">Close</button>
                </div>
            </div>
        </div>

        <!-- Logs Modal -->
        <div id="logs-modal" class="modal">
            <div class="modal-content modal-large">
                <span class="close">&times;</span>
                <h2>Docker Logs: <span id="logs-username"></span></h2>
                <div id="logs-container" class="logs-container"></div>
                <div class="form-group">
                    <button id="close-logs-btn" class="btn btn-secondary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
